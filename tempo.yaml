server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

live_store:
  shutdown_marker_dir: ./tempo-data/live-store/shutdown-marker
  wal:
    path: ./tempo-data/live-store/traces

storage:
  trace:
    backend: local
    local:
      path: ./tempo-data/blocks
    wal:
      path: ./tempo-data/wal
