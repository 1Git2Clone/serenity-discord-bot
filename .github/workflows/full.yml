name: Rust, Docker, Code Coverage

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.2
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: bot_database
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bot_database"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5432/bot_database
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432; do sleep 2; done

      - name: Run database migrations
        run: sqlx migrate run

      - name: Build
        run: cargo build --verbose --all-features

      - name: Run tests
        run: cargo test --verbose --all-features -- --nocapture

      - name: Install llvm-tools for coverage
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Pure logic: string utilities and XP math must be fully covered.
      # These modules have no I/O and every branch is reachable from unit tests.
      - name: Coverage — pure logic (100%)
        run: |
          cargo llvm-cov \
            --all-features \
            --include-pattern "src/utils/string_manipulation|src/commands/level_logic" \
            --fail-under-lines 100

      # Authorization gate: guild allow-list logic is security-relevant enough
      # to warrant near-total coverage despite the async DB paths.
      - name: Coverage — auth gate (90%)
        run: |
          cargo llvm-cov \
            --all-features \
            --include-pattern "src/data/ai/review/guilds" \
            --fail-under-lines 90

      # Global floor. Discord/event-handler/AI-pipeline paths are I/O-bound
      # and can't be fully exercised without live services, so 70% is the
      # realistic baseline rather than 80%.
      - name: Coverage — global floor (70%)
        run: |
          cargo llvm-cov \
            --all-features \
            --fail-under-lines 70 \
            --lcov \
            --output-path lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info

      - name: Create filler .env for Docker build
        run: |
          echo "DATABASE_URL=${DATABASE_URL}" > .env
          echo "BOT_TOKEN=dummy_token" >> .env

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
