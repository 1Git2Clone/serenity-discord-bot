stages:
  - lint_rust
  - docker_build
  - build_rust
  - run_tests_rust

variables:
  # Rust CI
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  # query! macros compile offline against the committed .sqlx, so lint needs no DB.
  SQLX_OFFLINE: "true"

clippy_rust:
  stage: lint_rust
  image: rust:latest
  script:
    - rustup component add clippy
    - cargo clippy --all-targets --all-features -- -D warnings

docker_build:
  stage: docker_build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build . --file Dockerfile --tag my-image-name:$(date +%s)

build_rust:
  stage: build_rust
  image: rust:latest
  script:
    - cargo build --verbose --all-features

run_tests_rust:
  stage: run_tests_rust
  image: rust:latest
  script:
    - cargo test --verbose --all-features -- --nocapture
